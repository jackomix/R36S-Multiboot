name: Custom Multiboot Build

on:
  workflow_dispatch:
    inputs:
      oses:
        description: 'Space-separated list of OSes to include (e.g., andr36oid darkosre ark)'
        required: true
        default: 'andr36oid darkosre'
      panel_num:
        description: 'Default Panel Number (for PanCho.ini)'
        required: true
        default: '4'
      pixeldrain_api_key:
        description: 'Pixeldrain API Key (Optional)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 whiptail jq parted p7zip-full xz-utils wget curl python3-pip megatools exfatprogs kpartx pv
          pip3 install gdown

      - name: Prepare Workspace
        run: |
          chmod +x *.sh
          # Ensure loop devices are initialized in the runner
          sudo modprobe loop
          for i in {0..7}; do
            sudo mknod /dev/loop$i b 7 $i 2>/dev/null || true
          done

      - name: Set Panel Configuration
        run: |
          echo "PanelNum=${{ github.event.inputs.panel_num }}" > commonbootfiles/PanCho.ini

      - name: Run Builder
        run: |
          # Set the build date inside the step so it expands
          export BuildImgEnv=github
          export GH_build_date=$(date +%Y%m%d)
          # Use sudo -E to preserve environment variables for the script
          sudo -E ./buildimg.sh ${{ github.event.inputs.oses }}
          # Ensure artifacts are readable by the runner user
          sudo chmod 644 *.img* *.7z* || true

      - name: Upload to External Mirror (Pixeldrain)
        if: success()
        run: |
          echo "--- Starting External Uploads ---"
          API_KEY="${{ github.event.inputs.pixeldrain_api_key }}"
          AUTH_FLAG=""
          if [ -n "$API_KEY" ]; then
            # Use Basic Auth: curl -u :<api_key> ...
            AUTH_FLAG="-u :$API_KEY"
            echo "Using Pixeldrain API Key for authenticated upload..."
          fi

          for f in R36S-Multiboot-*.img.xz* R36S-Multiboot-*.7z*; do
            if [ -f "$f" ]; then
              echo "Uploading $f to Pixeldrain..."
              # Upload and extract the ID from the JSON response
              RESPONSE=$(curl -s $AUTH_FLAG -T "$f" https://pixeldrain.com/api/file/)
              ID=$(echo $RESPONSE | jq -r '.id')
              if [ "$ID" != "null" ]; then
                echo "✅ $f uploaded successfully!"
                echo "🔗 Download Link: https://pixeldrain.com/u/$ID"
              else
                echo "❌ Failed to upload $f"
                echo "Response: $RESPONSE"
              fi
            fi
          done
          echo "--- External Uploads Complete ---"

      - name: Upload Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: R36S-Multiboot-Custom
          path: |
            *.img*
            *.7z*
          retention-days: 5
